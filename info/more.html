<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Academic Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            align-items: flex-start;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .profile-image {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            text-align: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-content {
            flex: 1;
            min-width: 300px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .intro {
            margin-bottom: 1.5rem;
            color: #555;
        }

        .intro a {
            color: #0066cc;
            text-decoration: none;
        }

        .intro a:hover {
            text-decoration: underline;
        }

        nav {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 1rem;
        }

        nav a {
            color: #333;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }

        nav a:hover,
        nav a.active {
            border-bottom-color: #333;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section h2 {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        .news-item,
        .publication-item {
            margin-bottom: 1.5rem;
            padding-left: 1rem;
        }

        .date {
            color: #666;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .news-content,
        .publication-content {
            color: #555;
        }

        .news-content a,
        .publication-content a {
            color: #0066cc;
            text-decoration: none;
            font-style: italic;
        }

        .news-content a:hover,
        .publication-content a:hover {
            text-decoration: underline;
        }

        .more-link {
            color: #666;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .more-link:hover {
            text-decoration: underline;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            border-radius: 50%;
            text-decoration: none;
            color: #333;
            transition: background-color 0.3s;
        }

        .social-links a:hover {
            background-color: #e0e0e0;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 2rem;
            }

            .profile-image {
                width: 150px;
                height: 150px;
            }

            nav {
                flex-wrap: wrap;
                gap: 1rem;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="home" class="section">
            <h2>News</h2>
            <div class="news-item">
                <div class="date">[2025/7] Just released my webpage !</div>
            </div>
        </div>
    </div>
</body>
